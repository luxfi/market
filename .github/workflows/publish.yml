name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Compute + tag version
        id: bump
        run: |
          set -e
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            LAST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LAST" ]; then
              NEW="0.1.0"
            else
              MAJOR=$(echo "${LAST#v}" | cut -d. -f1)
              MINOR=$(echo "${LAST#v}" | cut -d. -f2)
              PATCH=$(echo "${LAST#v}" | cut -d. -f3)
              MSG=$(git log -1 --pretty=%s)
              if [[ "$MSG" =~ ^feat[\(:] ]]; then
                NEW="$MAJOR.$((MINOR+1)).0"
              elif [[ "$MSG" =~ BREAKING\ CHANGE|! ]]; then
                NEW="$((MAJOR+1)).0.0"
              else
                NEW="$MAJOR.$MINOR.$((PATCH+1))"
              fi
            fi
            VERSION="$NEW"
            git config user.name 'github-actions[bot]'
            git config user.email 'github-actions[bot]@users.noreply.github.com'
            git tag "v$VERSION" || true
            git push origin "v$VERSION" || echo "tag push skipped"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION"

  build-push:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=v${{ needs.version.outputs.version }}
            type=raw,value=${{ needs.version.outputs.version }}
            type=sha,prefix=,suffix=,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
