name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/luxfi/market
      runner-amd64: evo
      runner-arm64: spark
      runner-deploy: evo
    secrets: inherit
