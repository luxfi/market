name: Docker Build

on:
  workflow_dispatch:
  push:
    tags: ['v*']

# NOTE: do NOT add a top-level `permissions:` block. Combined with
# `secrets: inherit` on a cross-org `uses:` it triggers silent
# startup_failure on the reusable workflow. The reusable's job-level
# permissions are sufficient.

jobs:
  docker:
    uses: luxfi/.github/.github/workflows/docker.yml@main
    with:
      image: ghcr.io/luxfi/market
      platforms: linux/amd64
      # ARC scale-set targeting: jobs must use the scale-set NAME as the
      # runs-on label (githubConfigUrl=github.com/luxfi, set name=lux-build).
      # fromJson() in the reusable decodes this string to a scalar label.
      runner-amd64: '"lux-build"'
      runner-deploy: '"lux-build"'
    secrets: inherit
